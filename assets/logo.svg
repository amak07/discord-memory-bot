    <path d="M-15 -8 Q-5 -3 0 -8" stroke-width="1.5"/>
    <path d="M15 -8 Q5 -3 0 -8" stroke-width="1.5"/>
    <path d="M-12 15 Q-5 10 0 15" stroke-width="1.5"/>
    <path d="M12 15 Q5 10 0 15" stroke-width="1.5"/>
  </g>

  <!-- Small sparkle dots -->
