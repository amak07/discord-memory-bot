    <path d="M-2 -25 Q-20 -25 -22 -12 Q-24 0 -15 5 Q-25 10 -20 22 Q-15 32 -2 28"/>
    <!-- Right hemisphere -->
    <path d="M2 -25 Q20 -25 22 -12 Q24 0 15 5 Q25 10 20 22 Q15 32 2 28"/>
