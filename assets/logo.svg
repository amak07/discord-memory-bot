  <circle cx="140" cy="55" r="2" fill="#5865F2" opacity="0.6"/>
  <circle cx="75" cy="120" r="1.5" fill="#5865F2" opacity="0.4"/>
  <circle cx="130" cy="120" r="1.5" fill="#5865F2" opacity="0.4"/>
